name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: make check
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.13'
        with:
          name: ankiaddon
          path: dist/*.ankiaddon

